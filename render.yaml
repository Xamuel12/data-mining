services:
  - type: web
    name: cultureexplore
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python init_db.py && gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cultureexplore-db
          property: connectionString

databases:
  - name: cultureexplore-db
    plan: free
    postgresMajorVersion: 15
